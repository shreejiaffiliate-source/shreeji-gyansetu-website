{% extends 'base.html' %}
{% block content %}
  <div class="container d-flex align-items-center justify-content-center py-5" style="min-height: 80vh;">
    <div class="card border-0 shadow-lg p-4" style="width: 100%; max-width: 450px; border-radius: 20px; background: var(--card-bg); border: 1px solid var(--border-color);">
      <div class="text-center mb-4">
        <div class="mb-3">
          <i class="fas fa-key fa-3x" style="color: var(--primary-blue);"></i>
        </div>
        <h3 class="fw-bold" style="color: var(--text-dark);">Create New Password</h3>
        <p style="color: var(--text-muted);">Set a strong password for your account.</p>
      </div>

      <form method="POST" onsubmit="return validatePasswords()">
        {% csrf_token %}
        <input type="hidden" name="email" value="{{ email }}" />
        <input type="hidden" name="otp" value="{{ otp }}" />

        <div class="mb-3">
          <label class="form-label fw-semibold" style="color: var(--text-dark);">New Password</label>
          <div class="position-relative d-flex align-items-center">
            <input type="password" name="password" id="pass1" class="form-control rounded-3 pe-5" style="background: var(--bg-light); color: var(--text-dark); border: 1px solid var(--border-color);" placeholder="Min 6 characters" required />
            <button class="btn border-0 position-absolute end-0 me-2 p-0" type="button" onclick="togglePasswordVisibility('pass1', this)" style="background: transparent; color: var(--text-dark); width: 40px; height: 100%; z-index: 10;"><i class="fas fa-eye"></i></button>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold" style="color: var(--text-dark);">Confirm New Password</label>
          <div class="position-relative d-flex align-items-center">
            <input type="password" name="confirm_password" id="pass2" class="form-control rounded-3 pe-5" style="background: var(--bg-light); color: var(--text-dark); border: 1px solid var(--border-color);" placeholder="Repeat password" required />
            <button class="btn border-0 position-absolute end-0 me-2 p-0" type="button" onclick="togglePasswordVisibility('pass2', this)" style="background: transparent; color: var(--text-dark); width: 40px; height: 100%; z-index: 10;"><i class="fas fa-eye"></i></button>
          </div>
          <div id="password-error" class="text-danger small mt-2" style="display: none;">Passwords do not match!</div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold btn-enroll">Update Password <i class="fas fa-check-circle ms-2"></i></button>
      </form>
    </div>
  </div>
{% endblock %}

{% block extra_js %}
  <script>
    // --- Toggle Visibility Logic ---
    function togglePasswordVisibility(inputId, btn) {
      const input = document.getElementById(inputId)
      const icon = btn.querySelector('i')
      if (input.type === 'password') {
        input.type = 'text'
        icon.classList.replace('fa-eye', 'fa-eye-slash')
      } else {
        input.type = 'password'
        icon.classList.replace('fa-eye-slash', 'fa-eye')
      }
    }
    
    // --- Frontend Validation (Optional but Recommended) ---
    function validatePasswords() {
      const pass1 = document.getElementById('pass1').value
      const pass2 = document.getElementById('pass2').value
      const errorDiv = document.getElementById('password-error')
    
      if (pass1 !== pass2) {
        errorDiv.style.display = 'block'
        return false
      }
      if (pass1.length < 6) {
        alert('Password must be at least 6 characters long.')
        return false
      }
      return true
    }
  </script>
{% endblock %}
