{% extends 'base.html' %}
{% block content %}
  {% load static %}
  <div class="container d-flex align-items-center justify-content-center pt-4" style="min-height: 80vh;">
    <div class="card border-0 shadow-lg p-4" style="width: 100%; max-width: 450px; border-radius: 20px; background: var(--card-bg);">
      <div class="text-center mb-4">
        <img src="{% static 'images/logo.png' %}" alt="Logo" height="60" class="mb-3" />
        <h3 class="fw-bold" style="color: var(--text-dark);">Welcome Back</h3>
        <p class="text-muted">Login to access your courses & dashboard</p>
      </div>

      <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label fw-semibold" style="color: var(--text-dark);">Username</label>
          <div class="position-relative d-flex align-items-center">
            <i class="fas fa-user position-absolute ms-3" style="color: var(--primary-blue); z-index: 5;"></i>
            <input type="text" name="username" class="form-control rounded-3 ps-5" style="background: var(--bg-light); color: var(--text-dark); border: 1px solid var(--border-color);" placeholder="Enter username" required />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold" style="color: var(--text-dark);">Password</label>
          <div class="position-relative d-flex align-items-center">
            <i class="fas fa-lock position-absolute ms-3" style="color: var(--primary-blue); z-index: 5;"></i>
            <input type="password" name="password" id="id_password" class="form-control rounded-3 ps-5 pe-5" style="background: var(--bg-light); color: var(--text-dark); border: 1px solid var(--border-color);" placeholder="Enter password" required />

            <button class="btn border-0 position-absolute end-0 me-2 p-0 toggle-password" type="button" onclick="togglePasswordVisibility('id_password', this)" style="background: transparent; color: var(--text-dark); width: 40px; height: 100%; z-index: 10;"><i class="fas fa-eye"></i></button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm mb-3 btn-enroll">Sign In <i class="fas fa-sign-in-alt ms-2"></i></button>

        <div class="text-center">
          <a href="#" class="text-decoration-none small text-muted">Forgot password?</a>
          <hr class="my-4" style="border-color: var(--border-color); opacity: 0.2;" />
          <p class="small mb-0" style="color: var(--text-dark);">
            Don't have an account? <a href="{% url 'register' %}" class="fw-bold" style="color: var(--primary-cyan);">Register Now</a>
          </p>
        </div>
      </form>
      <div class="text-center mt-3">
        <p class="text-muted small">OR</p>
        {% load socialaccount %}
        <a href="{% provider_login_url 'google' %}" class="btn btn-outline-dark w-100 py-2 rounded-3 fw-bold">
          <img src="{% static 'images/google_logo.png' %}" alt="G" height="20" class="me-2" />
          Continue with Google
        </a>
      </div>
    </div>
  </div>
{% endblock %}

{% block extra_js %}
  <script>
    function togglePasswordVisibility(inputId, btn) {
      const input = document.getElementById(inputId)
      const icon = btn.querySelector('i')
      if (input.type === 'password') {
        input.type = 'text'
        icon.classList.replace('fa-eye', 'fa-eye-slash')
      } else {
        input.type = 'password'
        icon.classList.replace('fa-eye-slash', 'fa-eye')
      }
    }
  </script>
{% endblock %}
