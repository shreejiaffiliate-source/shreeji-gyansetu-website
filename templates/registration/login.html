{% extends 'base.html' %}
{% block content %}
  {% load static %}
  <div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card border-0 shadow-lg p-4" style="width: 100%; max-width: 450px; border-radius: 20px; background: var(--card-bg);">
      <div class="text-center mb-4">
        <img src="{% static 'images/logo.png' %}" alt="Logo" height="60" class="mb-3" />
        <h3 class="fw-bold" style="color: var(--text-dark);">Welcome Back</h3>
        <p class="text-muted">Login to access your courses & dashboard</p>
      </div>

      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold" style="color: var(--text-dark);">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-0"><i class="fas fa-user text-primary"></i></span>
            <input type="text" name="username" class="form-control border-0 bg-light" placeholder="Enter username" required />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold" style="color: var(--text-dark);">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-primary"></i></span>
            <input type="password" name="password" class="form-control border-0 bg-light" placeholder="••••••••" required />
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm mb-3 btn-enroll">Sign In <i class="fas fa-sign-in-alt ms-2"></i></button>

        <div class="text-center">
          <a href="#" class="text-decoration-none small text-muted">Forgot password?</a>
          <hr class="my-4" />
          <p class="small mb-0">
            Don't have an account? <a href="{% url 'register' %}" class="fw-bold text-primary">Register Now</a>
          </p>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
