{% extends 'base.html' %}
{% block content %}
  <div class="container my-5">
    <h2 class="fw-bold mb-4" style="color: var(--text-dark);">Search Results for "{{ query }}"</h2>

    <div class="row g-4">
      {% for course in results %}
        <div class="col-md-3">
          <a href="{% url 'course_detail' course.slug %}" class="text-decoration-none text-dark">
            <div class="card h-100 course-card shadow-sm border-0">
              <img src="{{ course.thumbnail.url }}" class="card-img-top" alt="{{ course.title }}" />
              <div class="card-body">
                <h6 class="fw-bold" style="color: var(--text-dark);">{{ course.title }}</h6>
                <p class="fw-bold" style="color: var(--primary-green);">₹{{ course.price }}</p>
                <span class="btn btn-primary btn-sm w-100">View Course</span>
              </div>
            </div>
          </a>
        </div>
      {% empty %}
        <div class="col-12 text-center py-5">
          <i class="fas fa-search-minus fa-3x text-muted mb-3"></i>
          <h4 class="text-muted">No courses found matching your search.</h4>
          <a href="/" class="btn btn-primary mt-3">Back to Home</a>
        </div>
      {% endfor %}
    </div>
  </div>
{% endblock %}
