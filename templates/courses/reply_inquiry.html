{% extends 'base.html' %}
{% block content %}
  <div class="container" style="margin-top: 100px; max-width: 800px;">
    <div class="card border-0 shadow-sm" style="border-radius: 15px;">
      <div class="card-header bg-primary text-white py-3">
        <h5 class="mb-0">Reply to: {{ inquiry.name }}</h5>
      </div>
      <div class="card-body p-4">
        <div class="mb-4 p-3 bg-light rounded">
          <h6 class="fw-bold">Original Message:</h6>
          <p class="mb-1">
            <strong>Subject:</strong> {{ inquiry.subject }}
          </p>
          <p class="text-muted">{{ inquiry.message }}</p>
        </div>

        <form method="POST">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-bold">Your Response</label>
            {{ form.message }}
          </div>
          <div class="d-flex justify-content-between">
            <a href="{% url 'all_inquiries' %}" class="btn btn-light rounded-pill px-4">Cancel</a>
            <button type="submit" class="btn btn-primary rounded-pill px-4 shadow-sm"><i class="fas fa-paper-plane me-2"></i>Send Reply</button>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
