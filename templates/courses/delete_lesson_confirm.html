{% extends 'base.html' %}
{% block content %}
  <div class="container my-5 text-center">
    <div class="card border-0 shadow-sm p-5 mx-auto" style="max-width: 500px; background: var(--card-bg);">
      <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
      <h3 class="fw-bold">Delete Lesson?</h3>
      <p class="text-muted">
        Are you sure you want to delete <strong>"{{ lesson.title }}"</strong>? This action cannot be undone.
      </p>
      <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4 fw-bold">Yes, Delete</button>
        <a href="{% url 'course_detail_edit' lesson.course.slug %}" class="btn btn-light px-4">Cancel</a>
      </form>
    </div>
  </div>
{% endblock %}
