{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm p-4" style="background: var(--card-bg); color: var(--text-dark); border-radius: 15px;">
                <h3 class="fw-bold mb-4">Edit Lesson: {{ lesson.title }}</h3>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="fw-bold">Lesson Title</label>
                        <input type="text" name="title" class="form-control" value="{{ lesson.title }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold">Type</label>
                        <select name="lesson_type" class="form-select">
                            <option value="Video" {% if lesson.lesson_type == 'Video' %}selected{% endif %}>Video</option>
                            <option value="Notes" {% if lesson.lesson_type == 'Notes' %}selected{% endif %}>Notes (PDF)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold">Video URL</label>
                        <input type="url" name="video_url" class="form-control" value="{{ lesson.video_url|default:'' }}">
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold">Change File (Optional)</label>
                        <input type="file" name="content_file" class="form-control">
                        {% if lesson.content_file %}<small class="text-muted d-block mt-1">Current: {{ lesson.content_file.name }}</small>{% endif %}
                    </div>

                    <div class="mb-4">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="is_preview" id="isPreview" {% if lesson.is_preview %}checked{% endif %}>
                            <label class="form-check-label fw-bold" for="isPreview">
                                Make this a Free Preview lesson
                            </label>
                            <small class="d-block text-muted">Students can watch this lesson without buying the course.</small>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1 fw-bold rounded-pill">Update Lesson</button>
                        <a href="{% url 'course_detail_edit' lesson.course.slug %}" class="btn btn-outline-secondary rounded-pill">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
